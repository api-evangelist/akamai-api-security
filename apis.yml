  - type: Features
    data:
      - name: API Discovery
        description: >-
          Automatically discovers all APIs including shadow, zombie, GenAI,
          LLM, and MCP server APIs across cloud, on-premises, and hybrid
          environments.
      - name: Posture Management
        description: >-
          Audits APIs for vulnerabilities and misconfigurations including the
          full OWASP API Top 10, generating posture findings from runtime
          incidents.
      - name: Runtime Protection
        description: >-
          Uses contextual insights to detect and block API threats including
          business logic abuse, credential attacks, data scraping, and malicious
          bots in real time.
      - name: CI/CD Security Testing
        description: >-
          Runs 200+ dynamic security tests simulating OWASP API Top 10 attacks
          integrated into CI/CD pipelines without sacrificing development speed.
      - name: GitHub Integration
        description: >-
          Automatically scans GitHub repositories for OpenAPI specs and adds
          them to the API library for security analysis and posture assessment.
      - name: App and API Protector Integration
        description: >-
          Direct integration with Akamai App and API Protector for blocking
          API threats detected at runtime.
  - type: UseCases
    data:
      - name: Shadow API Discovery
        description: >-
          Security teams automatically discover undocumented and shadow APIs
          across their environment to eliminate blind spots.
      - name: API Vulnerability Assessment
        description: >-
          Security engineers assess API posture against OWASP API Top 10 and
          compliance frameworks to prioritize remediation.
      - name: Real-Time Threat Detection
        description: >-
          SOC analysts detect and respond to API attacks, data leakage, and
          suspicious behavior in real time.
      - name: Pre-Production API Testing
        description: >-
          Development teams integrate API security testing into CI/CD pipelines
          to find and fix vulnerabilities before production.
      - name: Compliance Reporting
        description: >-
          Compliance teams assess API security posture against industry
          frameworks and generate audit-ready reports.
  - type: Integrations
    data:
      - name: Akamai App and API Protector
        description: Direct integration for blocking API threats detected by API Security
      - name: GitHub
        description: Automatic OpenAPI spec discovery from GitHub repositories
      - name: CI/CD Pipelines
        description: Integration with development pipelines for pre-production security testing
      - name: SIEM
        description: Export security events to SIEM platforms for centralized monitoring
      - name: AWS Marketplace
        description: Available on AWS Marketplace for cloud-native deployments
