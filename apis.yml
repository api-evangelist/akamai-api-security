aid: akamai-api-security
name: Akamai API Security
description: >-
  Akamai API Security (formerly Noname Security) provides comprehensive API
  discovery, posture management, and threat protection for organizations across
  cloud, on-premises, and hybrid environments. The platform continuously
  discovers and monitors all APIs, identifies vulnerabilities and
  misconfigurations, detects and responds to API threats in real time, and
  provides pre-production security testing integrated into CI/CD pipelines.
