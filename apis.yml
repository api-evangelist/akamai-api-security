apis:
  - aid: akamai-api-security:api-security
    name: Akamai API Security
    description: >-
      Akamai API Security provides end-to-end API protection including
      discovery, posture management, runtime protection, and active testing. It
      discovers all APIs including shadow and zombie APIs, identifies
      vulnerabilities and misconfigurations, and detects and blocks API-based
      attacks in real time.
